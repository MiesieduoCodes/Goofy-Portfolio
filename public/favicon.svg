<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0a0a"/>
      <stop offset="100%" style="stop-color:#1a1a1a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#84cc16"/>
      <stop offset="100%" style="stop-color:#65a30d"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- M letter stylized -->
  <text x="50" y="68" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="50" 
        font-weight="700" 
        fill="url(#accent)" 
        text-anchor="middle">M</text>
  
  <!-- Decorative corner accent -->
  <path d="M 80 15 L 85 15 L 85 20" stroke="#84cc16" stroke-width="2" fill="none" opacity="0.6"/>
  <path d="M 20 85 L 15 85 L 15 80" stroke="#84cc16" stroke-width="2" fill="none" opacity="0.6"/>
</svg>
